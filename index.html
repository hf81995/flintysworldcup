<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flinty's World Cup 2026</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');
:root{--bg:#f5f1e8;--surface:#fff;--surface2:#f0ece1;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.18);--text:#1c1917;--muted:#78716c;--accent:#b5820b;--accent2:#92400e;--green:#15803d;--red:#dc2626;--blue:#1d4ed8;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:0 1rem 5rem}
.flag-strip{background:#0a1628;padding:10px 0;text-align:center;font-size:1.4rem;letter-spacing:2px;line-height:1;overflow:hidden;white-space:nowrap}
.hdr{background:linear-gradient(160deg,#0a1628 0%,#163050 60%,#0d2040 100%);color:#fff;text-align:center;padding:1.8rem 1rem 1.4rem;margin-bottom:1.5rem;position:relative}
.hdr h1{font-family:'Barlow Condensed',sans-serif;font-size:2.9rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase;background:linear-gradient(135deg,#f5c518,#e8860a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.hdr.mini{padding:1rem 1rem .8rem;margin-bottom:.5rem}
.hdr.mini h1{font-size:1.8rem}
.slogan{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.12em;text-transform:uppercase;margin-top:4px}
.prog-bar{display:flex;justify-content:center;gap:4px;margin-bottom:1.4rem;margin-top:.6rem}
.prog-step{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:30px;font-size:.74rem;font-weight:600;color:var(--muted);background:var(--surface2);border:1px solid var(--border);transition:all .2s}
.prog-step.active{background:#0a1628;color:#f5c518;border-color:#0a1628}
.prog-step.done{background:var(--green);color:#fff;border-color:var(--green)}
.prog-dot{width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;flex-shrink:0}
.prog-step.active .prog-dot{background:rgba(245,197,24,.2)}
.prog-step.done .prog-dot{background:rgba(255,255,255,.3)}
.name-row{margin-bottom:1rem}
.name-row label{display:block;font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em}
.sec-intro{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#0a1628;padding:8px 0 4px;border-bottom:2px solid #0a1628;margin-bottom:.8rem;margin-top:1.2rem}
details.inst{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:1.2rem;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
details.inst summary{padding:11px 14px;cursor:pointer;font-weight:600;font-size:.88rem;list-style:none;display:flex;align-items:center;gap:8px;color:#0a1628}
details.inst summary::-webkit-details-marker{display:none}
details.inst[open] summary{border-bottom:1px solid var(--border);background:var(--surface2)}
.inst-body{padding:14px 16px 16px;font-size:.82rem;line-height:1.75;color:var(--muted)}
.inst-body ul{padding-left:1.2rem;margin:8px 0}
.inst-body li{margin-bottom:4px;color:var(--text)}
.inst-section{margin-top:10px;color:var(--text);font-weight:500}
.inst-note{color:var(--red);font-weight:600;font-size:.8rem;margin-top:8px;padding:6px 10px;background:rgba(220,38,38,.05);border-radius:6px;border-left:3px solid var(--red)}
.inst-ex{margin-top:8px;padding:8px 12px;background:var(--surface2);border-radius:6px;font-size:.78rem;color:var(--muted);line-height:1.6;border-left:3px solid #f5c518}
.sel-section{margin-bottom:1.3rem}
.sel-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:.6rem;flex-wrap:wrap}
.sel-header h3{font-family:'Barlow Condensed',sans-serif;font-size:1.15rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:#0a1628}
.sel-sub{font-size:.72rem;color:var(--muted);margin-top:1px}
.mbadge{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:800;padding:4px 12px;border-radius:20px;letter-spacing:.05em;flex-shrink:0}
.mbadge.x1{background:rgba(29,78,216,.08);color:var(--blue);border:1px solid rgba(29,78,216,.25)}
.mbadge.x2{background:rgba(181,130,11,.1);color:var(--accent);border:1px solid rgba(181,130,11,.3)}
.pills{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:20px;border:1px solid var(--border2);background:#fff;font-family:'Barlow',sans-serif;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .12s;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.pill:hover{border-color:var(--accent);color:var(--text)}
.pill.on{background:#0a1628;border-color:#0a1628;color:#f5c518;font-weight:700}
.pill-tag{font-size:.62rem;font-weight:800;opacity:.6;font-family:'Barlow Condensed',sans-serif}
.pill-pts{font-size:.7rem;font-weight:700;opacity:.7;font-family:'Barlow Condensed',sans-serif}
.team-summary{background:var(--surface);border:2px solid #0a1628;border-radius:var(--r);padding:1rem 1.2rem;margin-bottom:1rem}
.team-summary h4{font-family:'Barlow Condensed',sans-serif;font-size:.88rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px}
.sum-teams{display:flex;flex-wrap:wrap;gap:7px}
.sum-team{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 11px}
.sum-name{font-size:.83rem;font-weight:600}
.sum-mult{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:800;color:var(--blue);background:rgba(29,78,216,.08);padding:1px 6px;border-radius:10px}
.sum-mult.x2{color:var(--accent);background:rgba(181,130,11,.1)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.3rem;margin-bottom:.75rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.q-label{font-size:.95rem;font-weight:600;line-height:1.4;margin-bottom:5px;color:var(--text)}
.q-sc{font-size:.75rem;color:var(--muted);margin-bottom:8px}
.q-italic{font-size:.78rem;color:var(--muted);font-style:italic;margin-bottom:8px;line-height:1.5}
.q-fact{font-size:.78rem;color:var(--muted);padding:8px 10px;background:var(--surface2);border-radius:6px;border-left:3px solid #f5c518;line-height:1.6;margin-top:6px}
.void-note{font-size:.68rem;color:var(--muted);opacity:.7;font-style:italic;margin-bottom:5px}
.stitle{margin:1.5rem 0 .7rem}
.stitle h3{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:#0a1628}
.stitle h3::after{content:'';display:block;height:3px;background:linear-gradient(90deg,#f5c518,transparent);border-radius:2px;margin-top:3px}
.stitle p{font-size:.8rem;color:var(--muted);margin-top:3px}
.info-toggle{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:0;border:none;background:none;font-size:.73rem;color:var(--muted);cursor:pointer;font-family:'Barlow',sans-serif;text-decoration:underline;text-decoration-style:dotted}
.info-toggle:hover{color:var(--accent)}
.info-box{background:var(--surface2);border-left:3px solid #f5c518;border-radius:0 6px 6px 0;padding:8px 12px;margin-top:6px;font-size:.78rem;color:var(--muted);line-height:1.6;white-space:pre-line}
.pg-sum{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin:1.2rem 0;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.pg-sum h4{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:8px 14px;border-bottom:1px solid var(--border);background:var(--surface2)}
.sr{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:7px 14px;border-bottom:1px solid var(--border);font-size:.8rem}
.sr:last-child{border-bottom:none}
.sr .ql{color:var(--muted);flex:1}
.sr .qv{color:var(--text);font-weight:600;white-space:nowrap;margin-left:8px;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:.75rem}
.gc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.gn{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#0a1628;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid #f5c518}
.gt{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.gt:last-child{border-bottom:none}
.go{color:var(--muted);font-size:.73rem;font-family:'Barlow Condensed',sans-serif;font-weight:600}
input[type=text],input[type=password],input[type=number],select{font-family:'Barlow',sans-serif;font-size:.9rem;background:#fff;border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);outline:none;width:100%;transition:border-color .15s;box-shadow:0 1px 2px rgba(0,0,0,.04)}
input:focus,select:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .12s;border:none}
.btn-p{background:#0a1628;color:#f5c518}
.btn-p:hover{background:#163050}
.btn-p:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed}
.btn-o{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-o:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 14px;font-size:.8rem}
.btn-d{border:1px solid rgba(220,38,38,.4);background:transparent;color:var(--red);cursor:pointer;font-family:'Barlow',sans-serif;font-size:.78rem;padding:4px 10px;border-radius:6px}
.btn-d:hover{background:rgba(220,38,38,.06)}
.sub-bar{margin-top:1.8rem;padding-top:1.4rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.prog-note{font-size:.78rem;color:var(--muted)}
.al-wrap{margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)}
.al-btn{font-size:.75rem;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'Barlow',sans-serif;text-decoration:underline;text-decoration-style:dotted}
.al-btn:hover{color:var(--accent)}
.pw-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px}
.pw-row input{max-width:180px}
.err-msg{font-size:.78rem;color:var(--red)}
.sbox{background:rgba(21,128,61,.07);border:1px solid rgba(21,128,61,.3);border-radius:var(--r);padding:1.2rem 1.4rem;margin-bottom:1rem}
.sbox h3{color:var(--green);font-size:1.1rem;margin-bottom:4px}
.sbox p{font-size:.85rem;color:#15803d}
.done-sum{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.3rem;margin-top:1rem}
.done-sum h4{font-family:'Barlow Condensed',sans-serif;font-size:.88rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}
.ah{display:flex;align-items:center;gap:10px;margin-bottom:1.2rem;flex-wrap:wrap;padding-top:.5rem}
.ah h2{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;flex:1;color:#0a1628}
.tab-row{display:flex;gap:5px;margin-bottom:1.2rem;flex-wrap:wrap}
.tb{padding:7px 16px;border:1px solid var(--border2);border-radius:8px;background:#fff;font-family:'Barlow',sans-serif;font-size:.82rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .12s;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.tb.on{background:#0a1628;border-color:#0a1628;color:#f5c518}
.stb-row{display:flex;gap:5px;margin-bottom:1rem;flex-wrap:wrap}
.stb{padding:5px 12px;border:1px solid var(--border2);border-radius:20px;background:#fff;font-family:'Barlow',sans-serif;font-size:.74rem;font-weight:600;color:var(--muted);cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.stb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.tbl{border-collapse:collapse;min-width:100%;font-size:.8rem}
.tbl th{padding:9px 10px;text-align:left;background:var(--surface2);font-weight:700;font-size:.7rem;color:var(--muted);white-space:nowrap;border-bottom:1px solid var(--border2);text-transform:uppercase;letter-spacing:.05em}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis;background:#fff}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface2)}
.ptsC{color:var(--accent);font-weight:700;text-align:right}
.ptsC.top{color:var(--green)}
.lb-c{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.lb-r{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);background:#fff}
.lb-r:last-child{border-bottom:none}
.lb-r.f1{background:rgba(245,197,24,.07)}
.lb-rk{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:900;color:var(--muted);width:26px;flex-shrink:0}
.lb-rk.gd{color:var(--accent)}
.lb-nm{flex:1;font-weight:600;font-size:.92rem}
.lb-sb{font-size:.7rem;color:var(--muted)}
.lb-pt{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:900;color:var(--accent)}
.lb-pt.top{color:var(--green)}
.ac{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.2rem;margin-bottom:.75rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ac>label{font-size:.7rem;font-weight:700;color:var(--muted);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.ap-wrap{display:flex;flex-wrap:wrap;gap:6px}
.ap{padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:#fff;font-family:'Barlow',sans-serif;font-size:.8rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .12s}
.ap:hover{border-color:var(--accent);color:var(--text)}
.ap.on{background:#0a1628;border-color:#0a1628;color:#f5c518;font-weight:700}
.scb{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1.2rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.scb p{font-size:.82rem;color:var(--muted)}
.gp-grid{display:flex;flex-direction:column;gap:6px}
.gp-row{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 12px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.gp-nm{font-weight:600;font-size:.88rem;min-width:110px}
.gp-tm{font-size:.7rem;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gp-in{width:80px!important;max-width:80px!important}
.li-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:10px}
.li-box label{font-size:.7rem;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.ts-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.ts-r{display:flex;align-items:center;gap:8px}
.ts-n{flex:1;font-size:.82rem;font-weight:500;display:flex;align-items:center;gap:5px}
.ts-m{font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;color:var(--accent);background:rgba(181,130,11,.1)}
.q18-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);background:#fff;flex-wrap:wrap}
.q18-row:last-child{border-bottom:none}
.q18-nm{flex:1;min-width:100px;font-weight:600;font-size:.85rem}
.q18-ans{font-size:.78rem;color:var(--muted)}
.loading{text-align:center;padding:4rem;color:var(--muted);font-size:.9rem}
.err-b{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.25);border-radius:var(--r);padding:12px 16px;font-size:.83rem;color:var(--red);margin-bottom:1rem;line-height:1.6}
.setup-b{background:#fff;border:1px solid var(--border2);border-radius:var(--r);padding:1.5rem;margin-top:1.5rem}
.setup-b h3{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;color:#0a1628;margin-bottom:.75rem}
.setup-b ol{padding-left:1.2rem;color:var(--muted);font-size:.88rem;line-height:2}
.setup-b code{background:var(--surface2);padding:2px 7px;border-radius:4px;color:var(--text);font-size:.82rem;font-family:monospace}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-weight:600;padding:10px 22px;border-radius:20px;font-size:.85rem;z-index:999;animation:fu .25s ease}
.lb-ans{font-size:.75rem;color:var(--muted);background:var(--surface2);border-radius:6px;padding:2px 8px;margin-left:4px}
.lb-ans.win{color:var(--green);background:rgba(21,128,61,.08)}
.live-note{font-size:.75rem;color:var(--muted);font-style:italic;margin-bottom:.8rem;padding:6px 10px;background:rgba(181,130,11,.07);border-radius:6px;border-left:3px solid var(--accent)}
.pct-bar{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);align-items:center}
.pct-label{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.pct-stat{font-size:.72rem;color:var(--muted);background:var(--surface2);border-radius:12px;padding:2px 8px;border:1px solid var(--border)}
.pct-stat.lead{color:var(--green);background:rgba(21,128,61,.07);border-color:rgba(21,128,61,.2);font-weight:600}
.ep-wrap{margin-top:1.8rem;padding-top:1.4rem;border-top:1px solid var(--border)}
.ep-title{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#0a1628;margin-bottom:.8rem}
.ko-banner{background:#0a1628;color:#f5c518;border-radius:var(--r);padding:1.4rem 1.6rem;margin-bottom:1.4rem;text-align:center}
.ko-banner h2{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:900;letter-spacing:.04em;text-transform:uppercase;line-height:1.2;margin-bottom:.5rem}
.ko-banner p{font-size:.88rem;opacity:.85;line-height:1.6}
@keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.winner-votes{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border)}
.wv-list{display:flex;flex-direction:column;gap:5px;margin-top:6px}
.wv-row{display:flex;align-items:center;gap:8px}
.wv-nm{min-width:90px;font-size:.78rem;font-weight:600}
.wv-bw{flex:1;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden}
.wv-b{height:100%;background:var(--accent);border-radius:4px}
.wv-pc{font-size:.72rem;color:var(--muted);white-space:nowrap;min-width:60px;text-align:right}
.score-grid{display:grid;grid-template-columns:1fr auto;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin:10px 0 12px}
.sg-action{padding:7px 12px;font-size:.82rem;border-bottom:1px solid var(--border);background:#fff}
.sg-pts{padding:7px 12px;font-size:.82rem;font-weight:700;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;color:#0a1628;background:#fff}
.sg-pts.neg{color:var(--red)}
.sg-action:nth-child(4n+3),.sg-pts:nth-child(4n+4){background:var(--surface2)}
.sg-last .sg-action,.sg-last .sg-pts{border-bottom:none}

function goalsBucket(n){
  const g=parseInt(n);if(isNaN(g))return'';
  if(g<=3)return'1, 2 or 3';if(g<=5)return'4 or 5';if(g<=7)return'6 or 7';
  if(g<=9)return'8 or 9';if(g<=11)return'10 or 11';return'12 or more';
}

function calcScore(e,cor){
  let p=0;
  p+=(e.quickest_pts||0);
  if(cor.lg&&cor.lg!=='Void'&&e.legends_goals===cor.lg)p+=10;
  if(cor.la&&cor.la!=='Void'&&e.legends_assists===cor.la)p+=10;
  if(cor.lm&&cor.lm!=='Void'&&e.legends_minutes===cor.lm)p+=10;
  if(cor.kts&&e.kane_top_scorer===cor.kts)p+=e.kane_top_scorer==='Yes'?10:15;
  if(cor.gbl&&e.golden_boot_list===cor.gbl)p+=10;
  if(cor.gbgA&&e.golden_boot_goals===goalsBucket(cor.gbgA))p+=15;
  if(cor.ats&&e.all_teams_score===cor.ats)p+=10;
  if(cor.penA!==undefined&&cor.penA!==''){const cv=parseInt(cor.penA)>=7?'Yes':'No';if(e.penalty_shootouts===cv)p+=10;}
  if(cor.bl&&e.best_luis===cor.bl)p+=10;
  if(cor.ba&&e.brunos_assists===cor.ba)p+=10;
  if(cor.hu&&e.haaland_unusual===cor.hu)p+=10;
  if(cor.yas&&e.yamal_score_assist===cor.yas)p+=10;
  if(cor.ta&&e.tartan_army===cor.ta)p+=10;
  if(cor.frc&&e.final_red_card===cor.frc)p+=e.final_red_card==='Yes'?20:10;
  if(cor.f90&&e.final_90mins===cor.f90)p+=e.final_90mins==='Yes'?10:20;
  if(cor.f2p&&e.final_2plus===cor.f2p)p+=e.final_2plus==='Yes'?20:15;
  if(cor.fco&&e.final_corners===cor.fco)p+=10;
  if(cor.fsh&&e.final_shakira===cor.fsh)p+=10;
  if(cor.fma&&e.final_madonna===cor.fma)p+=10;
  if(cor.ftr&&e.final_trump===cor.ftr)p+=10;
  if(cor.fw&&e.final_winner&&e.final_winner.trim().toLowerCase()===cor.fw.trim().toLowerCase())p+=25;
  return p;
}

function secScore(e,cor,sec){
  switch(sec){
    case'overall':return(e.total_score||0)+(e.group_pts||0);
    case'group':return e.group_pts||0;
    case'legends':{let p=0;if(cor.lg&&cor.lg!=='Void'&&e.legends_goals===cor.lg)p+=10;if(cor.la&&cor.la!=='Void'&&e.legends_assists===cor.la)p+=10;if(cor.lm&&cor.lm!=='Void'&&e.legends_minutes===cor.lm)p+=10;return p;}
    case'bigh':if(!cor.kts)return null;return e.kane_top_scorer===cor.kts?(e.kane_top_scorer==='Yes'?10:15):0;
    case'gboot':{let p=0;if(cor.gbl&&e.golden_boot_list===cor.gbl)p+=10;if(cor.gbgA&&e.golden_boot_goals===goalsBucket(cor.gbgA))p+=15;return p;}
    case'pennos':if(cor.penA===undefined||cor.penA==='')return null;{const cv=parseInt(cor.penA)>=7?'Yes':'No';return e.penalty_shootouts===cv?10:0;}
    case'quick':return e.quickest_pts||0;
    case'final':{let p=0;if(cor.frc&&e.final_red_card===cor.frc)p+=e.final_red_card==='Yes'?20:10;if(cor.f90&&e.final_90mins===cor.f90)p+=e.final_90mins==='Yes'?10:20;if(cor.f2p&&e.final_2plus===cor.f2p)p+=e.final_2plus==='Yes'?20:15;if(cor.fco&&e.final_corners===cor.fco)p+=10;if(cor.fsh&&e.final_shakira===cor.fsh)p+=10;if(cor.fma&&e.final_madonna===cor.fma)p+=10;if(cor.ftr&&e.final_trump===cor.ftr)p+=10;if(cor.fw&&e.final_winner&&e.final_winner.trim().toLowerCase()===cor.fw.trim().toLowerCase())p+=25;return p;}
    default:return 0;
  }
}

function PctBar({entries,qkey,opts}){
  const answered=entries.filter(e=>e[qkey]);
  if(answered.length===0)return null;
  const counts={};opts.forEach(o=>{counts[o]=0;});
  answered.forEach(e=>{if(counts[e[qkey]]!==undefined)counts[e[qkey]]++;});
  const max=Math.max(...Object.values(counts));
  return h('div',{className:'pct-bar'},
    h('span',{className:'pct-label'},'рҹ“Ҡ '+answered.length+' votes:'),
    ...opts.map(o=>{
      const pct=answered.length?Math.round(counts[o]/answered.length*100):0;
      return h('span',{key:o,className:'pct-stat'+(counts[o]===max&&max>0?' lead':'')},o+': '+pct+'% ('+counts[o]+')');
    })
  );
}

function WinnerVotes({entries}){
  const answered=entries.filter(e=>e.final_winner&&e.final_winner.trim());
  if(answered.length===0)return null;
  const counts={};
  answered.forEach(e=>{const k=e.final_winner.trim();const key=k.charAt(0).toUpperCase()+k.slice(1).toLowerCase();counts[key]=(counts[key]||0)+1;});
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const total=answered.length;
  return h('div',{className:'winner-votes'},
    h('p',{className:'pct-label'},'рҹ“Ҡ '+total+' vote'+(total===1?'':'s')+' so far:'),
    h('div',{className:'wv-list'},
      sorted.map(([country,count])=>{
        const pct=Math.round(count/total*100);
        return h('div',{key:country,className:'wv-row'},
          h('span',{className:'wv-nm'},country),
          h('div',{className:'wv-bw'},h('div',{className:'wv-b',style:{width:pct+'%'}})),
          h('span',{className:'wv-pc'},pct+'% ('+count+')')
        );
      })
    )
  );
}

function LBList({data,showSub}){
  if(!data||data.length===0)return h('p',{style:{color:'var(--muted)',fontSize:'.85rem'}},'No entries yet.');
  const sorted=[...data].filter(x=>x.pts!==null).sort((a,b)=>b.pts-a.pts);
  if(sorted.length===0)return h('p',{style:{color:'var(--muted)',fontSize:'.85rem'}},'Enter correct answer above to see scores.');
  return h('div',{className:'lb-c'},
    sorted.map((e,i)=>h('div',{key:e.id,className:'lb-r'+(i===0?' f1':'')},
      h('span',{className:'lb-rk'+(i===0?' gd':'')},(i+1)+'.'),

        showSub&&h('p',{className:'lb-sb'},showSub(e))
      ),
      h('span',{className:'lb-pt'+(i===0?' top':'')},e.pts+' pts')
    ))
  );
}

function AdminScreen({entries,onBack,onDelete,onRefresh}){
  const[cor,sCor]=useState({lg:'',la:'',lm:'',kts:'',gbl:'',gbgA:'',ats:'',penA:'',bl:'',ba:'',hu:'',yas:'',ta:'',frc:'',f90:'',f2p:'',fco:'',fsh:'',fma:'',ftr:'',fw:''});

  const[tab,sTab]=useState('entries');
  const[sub,sSub]=useState('overall');
  const[applying,sApplying]=useState(false);
  const[toast,sToast]=useState('');
  const[delId,sDel]=useState(null);
  const sc=(k,v)=>sCor(x=>({...x,[k]:x[k]===v?'':v}));
  const showToast=msg=>{sToast(msg);setTimeout(()=>sToast(''),2500);};

  useEffect(()=>{const i={};entries.forEach(e=>{i[e.id]=e.group_pts||0;});sLGP(i);},[entries]);

  const scored=useMemo(()=>entries.map(e=>({...e,calc:calcScore(e,cor)})).sort((a,b)=>b.total_score-a.total_score),[entries,cor]);

  const apply=async()=>{sApplying(true);for(const e of scored)await dbUpdateScore(e.id,e.calc);await onRefresh();sApplying(false);showToast('вң“ Scores saved to Supabase!');};
  const saveGP=async()=>{sApplying(true);for(const id in localGP)await dbUpdateGroupPts(id,localGP[id]||0);await onRefresh();sApplying(false);showToast('вң“ Group points saved!');};
  const doDelete=async id=>{sDel(id);const ok=await dbDelete(id);if(ok)onDelete(id);sDel(null);};
  const csv=()=>{
    const cols=['username','created_at','top1','top2','top3','home_team','lower1','lower2','lower3','legends_goals','legends_assists','legends_minutes','kane_top_scorer','golden_boot_list','golden_boot_goals','all_teams_score','quickest_goal','penalty_shootouts','final_red_card','final_90mins','final_2plus','final_corners','final_shakira','final_madonna','final_trump','final_winner','group_pts','total_score'];
    const s=[cols,...scored.map(e=>cols.map(c=>e[c]||''))].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    const b=new Blob([s],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='flinty_wc2026.csv';a.click();URL.revokeObjectURL(u);
  };

  const Tb=({t,l})=>h('button',{type:'button',className:'tb'+(tab===t?' on':''),onClick:()=>sTab(t)},l);
  const Stb=({t,l})=>h('button',{type:'button',className:'stb'+(sub===t?' on':''),onClick:()=>sSub(t)},l);
  const Ac=({lbl,children})=>h('div',{className:'ac'},h('label',null,lbl),children);
  const Ap=({k,opts})=>h('div',{className:'ap-wrap'},...opts.map(o=>h('button',{key:o,type:'button',className:'ap'+(cor[k]===o?' on':''),onClick:()=>sc(k,o)},o)));

  // Section leaderboard data
  const lbData=(sec)=>entries.map(e=>({...e,pts:secScore(e,cor,sec)}));

  return h('div',{style:{minHeight:'100vh',background:'var(--bg)'}},
    h('div',{className:'flag-strip'},'рҹҸҙу Ғ§у Ғўу ҒҘу Ғ®у Ғ§у Ғҝ рҹҮ§рҹҮ· рҹҮ«рҹҮ· рҹҮҰрҹҮ· рҹҮөрҹҮ№ рҹҮӘрҹҮё рҹҮ©рҹҮӘ рҹҮәрҹҮё рҹҮҜрҹҮө рҹҮІрҹҮҪ рҹҮЁрҹҮҰ рҹҮёрҹҮҰ рҹҮІрҹҮҰ рҹҸҙу Ғ§у Ғўу Ғіу ҒЈу Ғҙу Ғҝ рҹҮірҹҮұ рҹҮ§рҹҮӘ рҹҮӯрҹҮ№ рҹҮ®рҹҮ¶ рҹҮөрҹҮҰ рҹҮ¶рҹҮҰ рҹҮәрҹҮҝ'),
    toast&&h('div',{className:'toast'},toast),
    h('div',{className:'wrap'},
      h('div',{className:'ah'},
        h('button',{className:'btn btn-o btn-sm',onClick:onBack},'вҶҗ Back'),
        h('h2',null,"Admin вҖ” Flinty's WC"),
        h('div',{style:{display:'flex',gap:'6px'}},
          h('button',{className:'btn btn-o btn-sm',onClick:onRefresh},'вҶ»'),
          h('button',{className:'btn btn-o btn-sm',onClick:csv},'вҶ“ CSV')
        )
      ),
      h('div',{className:'tab-row'},
        h(Tb,{t:'entries',l:'All Entries'}),
        h(Tb,{t:'grouppts',l:'Group Points'}),
        h(Tb,{t:'leaderboards',l:'Leaderboards'}),
        h(Tb,{t:'scoring',l:'Scoring'})
      ),

      /* в”Җв”Җ ENTRIES в”Җв”Җ */
      tab==='entries'&&h('div',null,
        entries.length===0?h('p',{style:{color:'var(--muted)'}},'No entries yet.')
        :h('div',{className:'tbl-wrap'},
            h('table',{className:'tbl'},
              h('thead',null,h('tr',null,
                h('th',null,'Name'),h('th',null,'Г—1 Teams'),h('th',null,'Home'),h('th',null,'Г—2 Teams'),
                h('th',{style:{textAlign:'right'}},'Score'),h('th',null)
              )),
              h('tbody',null,...scored.map((e,i)=>h('tr',{key:e.id},
                h('td',{style:{fontWeight:600}},e.username),
                h('td',null,[e.top1,e.top2,e.top3].filter(Boolean).join(', ')||'вҖ”'),
                h('td',null,e.home_team||'вҖ”'),
                h('td',null,[e.lower1,e.lower2,e.lower3].filter(Boolean).join(', ')||'вҖ”'),
                h('td',{className:'ptsC'+(i===0?' top':'')},e.total_score),
                h('td',null,h('button',{className:'btn-d',disabled:delId===e.id,onClick:()=>doDelete(e.id)},delId===e.id?'вҖҰ':'Delete'))
              )))
            )
          )
      ),

      /* в”Җв”Җ GROUP POINTS в”Җв”Җ */
      tab==='grouppts'&&h('div',null,
        h('div',{className:'scb'},
          h('div',null,
            h('p',null,'Enter each player\'s Group Performers points. Based on wins, goals and the multiplier system.'),
            h('p',{style:{fontSize:'.72rem',marginTop:'2px',color:'var(--muted)'}},'These are separate from auto-scored questions and saved independently.')
          ),
          h('button',{className:'btn btn-p',disabled:applying,onClick:saveGP},applying?'Saving...':'Save group points')
        ),
        entries.length===0?h('p',{style:{color:'var(--muted)'}},'No entries yet.')
        :h('div',{className:'gp-grid'},
            entries.map(e=>h('div',{key:e.id,className:'gp-row'},
              h('span',{className:'gp-nm'},e.username),
              h('span',{className:'gp-tm'},[e.top1,e.top2,e.top3].filter(Boolean).join('В·')+(e.home_team?' | '+e.home_team:'')+([e.lower1,e.lower2,e.lower3].filter(Boolean).length?' | '+[e.lower1,e.lower2,e.lower3].filter(Boolean).join('В·'):'')),
              h('input',{type:'number',className:'gp-in',value:localGP[e.id]||'',onChange:ev=>sLGP(p=>({...p,[e.id]:+ev.target.value||0})),placeholder:'0'})
            ))
          )
      ),

      /* в”Җв”Җ LEADERBOARDS в”Җв”Җ */
      tab==='leaderboards'&&h('div',null,
        h('p',{className:'live-note'},'Scores shown are live previews based on what you\'ve entered in the Scoring tab. Press "Save scores to Supabase" there to commit them. Overall leaderboard uses committed scores.'),
        h('div',{className:'stb-row'},
          h(Stb,{t:'overall',l:'рҹҸҶ Overall'}),h(Stb,{t:'group',l:'вҡҪ Group Stage'}),
          h(Stb,{t:'legends',l:'рҹ‘ҙ Messi v Ronaldo'}),h(Stb,{t:'bigh',l:'рҹҸҙу Ғ§у Ғўу ҒҘу Ғ®у Ғ§у Ғҝ Big H'}),
          h(Stb,{t:'gboot',l:'рҹ‘ҹ Golden Boot'}),h(Stb,{t:'pennos',l:'рҹҘ… Pennos'}),
          h(Stb,{t:'quick',l:'вҡЎ Quickest Goal'}),h(Stb,{t:'final',l:'рҹҸҶ The Final'})
        ),

        sub==='overall'&&h('div',null,
          h('p',{style:{fontSize:'.78rem',color:'var(--muted)',marginBottom:'10px'}},'Overall = committed total_score + group_pts saved in Supabase.'),
          h(LBList,{data:entries.map(e=>({...e,pts:(e.total_score||0)+(e.group_pts||0)})),showSub:e=>'Group: '+(e.group_pts||0)+' pts В· Other: '+(e.total_score||0)+' pts'})
        ),

        sub==='group'&&h('div',null,
          h('p',{style:{fontSize:'.78rem',color:'var(--muted)',marginBottom:'10px'}},'Group Performers points вҖ” enter and save these in the Group Points tab.'),
          h(LBList,{data:lbData('group'),showSub:e=>[e.top1,e.top2,e.top3,e.home_team,e.lower1,e.lower2,e.lower3].filter(Boolean).join(' В· ')})
        ),

        sub==='legends'&&h('div',null,
          h('p',{style:{fontSize:'.78rem',color:'var(--muted)',marginBottom:'10px'}},'Based on Messi v Ronaldo correct answers entered in Scoring tab.'),
          h(LBList,{data:lbData('legends'),showSub:e=>'Goals: '+(e.legends_goals||'вҖ”')+' В· Assists: '+(e.legends_assists||'вҖ”')+' В· Mins: '+(e.legends_minutes||'вҖ”')})
        ),

        sub==='bigh'&&h('div',null,
          h('div',{className:'li-box'},
            h('label',null,'Current state: is Kane England\'s top scorer?'),
            h('div',{className:'ap-wrap',style:{marginTop:'4px'}},
              ['Yes','No'].map(o=>h('button',{key:o,type:'button',className:'ap'+(cor.kts===o?' on':''),onClick:()=>sc('kts',o)},o))
            ),
            !cor.kts&&h('p',{style:{fontSize:'.72rem',color:'var(--muted)',marginTop:'6px'}},'Select above to see leaderboard')
          ),
          cor.kts&&h(LBList,{data:lbData('bigh'),showSub:e=>'Answered: '+(e.kane_top_scorer||'вҖ”')})
        ),

        sub==='gboot'&&h('div',null,
          h('div',{className:'li-box'},
            h('label',null,'Did a listed player win the Golden Boot?'),
            h('div',{className:'ap-wrap',style:{marginTop:'4px'}},
              ['Yes','No'].map(o=>h('button',{key:o,type:'button',className:'ap'+(cor.gbl===o?' on':''),onClick:()=>sc('gbl',o)},o))
            ),
            h('label',{style:{marginTop:'10px',display:'block'}},'Actual Golden Boot goals scored (to score the goals range question):'),
            h('input',{type:'number',value:cor.gbgA||'',onChange:e=>sCor(x=>({...x,gbgA:e.target.value})),placeholder:'e.g. 8',style:{maxWidth:'100px',marginTop:'4px'}})
          ),
          h(LBList,{data:lbData('gboot'),showSub:e=>'List Yes/No: '+(e.golden_boot_list||'вҖ”')+' В· Goals range: '+(e.golden_boot_goals||'вҖ”')})
        ),

        sub==='pennos'&&h('div',null,
          h('div',{className:'li-box'},
            h('label',null,'How many penalty shootouts have there been so far?'),
            h('input',{type:'number',value:cor.penA||'',onChange:e=>sCor(x=>({...x,penA:e.target.value})),placeholder:'e.g. 5',style:{maxWidth:'100px',marginTop:'4px'}})
          ),
          h(LBList,{data:lbData('pennos'),showSub:e=>'Answered: '+(e.penalty_shootouts||'вҖ”')})
        ),

        sub==='quick'&&h('div',null,
          h('p',{style:{fontSize:'.78rem',color:'var(--muted)',marginBottom:'10px'}},'Assign pts in the Scoring tab. Showing current saved quickest_pts.'),
          h(LBList,{data:entries.map(e=>({...e,pts:e.quickest_pts||0})),showSub:e=>'Answer: '+(e.quickest_goal||'вҖ”')})
        ),

        sub==='final'&&h('div',null,
          h('p',{style:{fontSize:'.78rem',color:'var(--muted)',marginBottom:'10px'}},'Based on Final correct answers entered in Scoring tab.'),
          h(LBList,{data:lbData('final'),showSub:e=>'Winner: '+(e.final_winner||'вҖ”')})
        )
      ),

      /* в”Җв”Җ SCORING в”Җв”Җ */
      tab==='scoring'&&h('div',null,
        h('div',{className:'scb'},
          h('div',null,
            h('p',null,'Enter correct answers below. Scores calculate live in Leaderboards.'),
            h('p',{style:{fontSize:'.72rem',marginTop:'2px',color:'var(--muted)'}},'Click "Save" to commit total_score to Supabase (group_pts saved separately in Group Points tab).')
          ),
          h('button',{className:'btn btn-p',disabled:applying,onClick:apply},applying?'Saving...':'Save scores to Supabase')
        ),
        h(Ac,{lbl:'Legends вҖ” Most Goals'},h(Ap,{k:'lg',opts:['Messi','Ronaldo','Void']})),
        h(Ac,{lbl:'Legends вҖ” Most Assists'},h(Ap,{k:'la',opts:['Messi','Ronaldo','Void']})),
        h(Ac,{lbl:'Legends вҖ” Most Minutes'},h(Ap,{k:'lm',opts:['Messi','Ronaldo','Void']})),
        h(Ac,{lbl:"Kane England's top scorer?"},h(Ap,{k:'kts',opts:['Yes','No']})),
        h(Ac,{lbl:'Golden Boot from listed players?'},h(Ap,{k:'gbl',opts:['Yes','No']})),
        h(Ac,{lbl:'Golden Boot actual goals (auto-determines range)'},
          h('input',{type:'number',value:cor.gbgA||'',onChange:e=>sCor(x=>({...x,gbgA:e.target.value})),placeholder:'e.g. 8',style:{maxWidth:'100px'}}),
          cor.gbgA&&h('p',{style:{fontSize:'.75rem',color:'var(--green)',marginTop:'4px'}},'Correct range: '+goalsBucket(cor.gbgA))
        ),
        h(Ac,{lbl:'All 48 teams score?'},h(Ap,{k:'ats',opts:['Yes','No']})),
        h(Ac,{lbl:'Penalty shootouts вҖ” actual count (7+ = Yes)'},
          h('input',{type:'number',value:cor.penA||'',onChange:e=>sCor(x=>({...x,penA:e.target.value})),placeholder:'e.g. 5',style:{maxWidth:'100px'}}),
          cor.penA!==''&&cor.penA!==undefined&&h('p',{style:{fontSize:'.75rem',color:'var(--green)',marginTop:'4px'}},'Correct answer: '+(parseInt(cor.penA)>=7?'Yes':'No'))
        ),
        h(Ac,{lbl:'Quickest Goal вҖ” manual scoring (assign below, saves instantly)'},
          h('p',{style:{fontSize:'.75rem',color:'var(--muted)',marginBottom:'8px'}},'20 pts = closest В· 15 pts = 2nd closest В· 0 = not in top 2'),
          h('div',{style:{border:'1px solid var(--border)',borderRadius:'8px',overflow:'hidden'}},
            entries.length===0?h('p',{style:{padding:'10px 12px',color:'var(--muted)',fontSize:'.82rem'}},'No entries yet.')
            :entries.map((e,i)=>h('div',{key:e.id,className:'q18-row'},
                h('div',{style:{flex:1}},h('span',{className:'q18-nm'},e.username+' '),h('span',{className:'q18-ans'},e.quickest_goal||'вҖ”')),
                h('div',{style:{display:'flex',gap:'5px'}},
                  ...[20,15,0].map(pts=>h('button',{key:pts,type:'button',className:'pill'+((e.quickest_pts||0)===pts?' on':''),
                    style:{padding:'4px 10px',fontSize:'.75rem'},
                    onClick:async()=>{await dbUpdateQuickest(e.id,pts);await onRefresh();}},pts===0?'0':pts+' pts'))
                )
              ))
          )
        ),
        h(Ac,{lbl:'The Best Luis вҖ” who scored more for Colombia?'},h(Ap,{k:'bl',opts:['Luis Suarez','Luis Diaz']})),
        h(Ac,{lbl:"Bruno's Assists вҖ” 5 or more?"},h(Ap,{k:'ba',opts:['Yes','No']})),
        h(Ac,{lbl:'Haaland вҖ” scored with head or right foot?'},h(Ap,{k:'hu',opts:['Yes','No']})),
        h(Ac,{lbl:'Yamal вҖ” score more or assist more?'},h(Ap,{k:'yas',opts:['Score More','Assist More']})),
        h(Ac,{lbl:'Tartan Army вҖ” McTominay + McGinn 3 goals?'},h(Ap,{k:'ta',opts:['Yes','No']})),
        h(Ac,{lbl:'Red card in final?'},h(Ap,{k:'frc',opts:['Yes','No']})),
        h(Ac,{lbl:'Decided in 90 mins?'},h(Ap,{k:'f90',opts:['Yes','No']})),
        h(Ac,{lbl:'Both teams 4+ corners?'},h(Ap,{k:'fco',opts:['Yes','No']})),
        h(Ac,{lbl:'Individual scores 2+ in final?'},h(Ap,{k:'f2p',opts:['Yes','No']})),
        h(Ac,{lbl:'Shakira вҖ” Waka Waka?'},h(Ap,{k:'fsh',opts:['Yes','No']})),
        h(Ac,{lbl:'Madonna вҖ” Into The Groove?'},h(Ap,{k:'fma',opts:['Yes','No']})),
        h(Ac,{lbl:'Trump holds/presents trophy?'},h(Ap,{k:'ftr',opts:['Yes','No']})),
        h(Ac,{lbl:'World Cup winner'},h('input',{type:'text',value:cor.fw||'',onChange:e=>sCor(x=>({...x,fw:e.target.value})),placeholder:'e.g. France',style:{maxWidth:'200px'}})),
        h('div',{style:{marginTop:'1.5rem',textAlign:'center'}},
          h('button',{className:'btn btn-p',disabled:applying,onClick:apply},applying?'Saving...':'Save scores to Supabase')
        )
      )
    )
  );
}

function PwGate({onSuccess}){
  const[pw,sPw]=useState('');const[err,sErr]=useState(false);
  const go=()=>{if(pw===ADMIN_PW)onSuccess();else sErr(true);};
  return h('div',{className:'pw-row'},
    h('input',{type:'password',value:pw,onChange:e=>sPw(e.target.value),onKeyDown:e=>{if(e.key==='Enter')go();},placeholder:'Admin password',style:{maxWidth:'180px'}}),
    h('button',{className:'btn btn-o btn-sm',onClick:go},'Enter'),
    err&&h('span',{className:'err-msg'},' Incorrect password')
  );
}

function SetupScreen(){
  return h('div',null,
    h('div',{className:'flag-strip'},'рҹҸҙу Ғ§у Ғўу ҒҘу Ғ®у Ғ§у Ғҝ рҹҮ§рҹҮ· рҹҮ«рҹҮ· рҹҮҰрҹҮ· рҹҮөрҹҮ№ рҹҮӘрҹҮё рҹҮ©рҹҮӘ рҹҮәрҹҮё рҹҮҜрҹҮө рҹҮІрҹҮҪ рҹҮЁрҹҮҰ рҹҮёрҹҮҰ рҹҮІрҹҮҰ рҹҸҙу Ғ§у Ғўу Ғіу ҒЈу Ғҙу Ғҝ рҹҮірҹҮұ рҹҮ§рҹҮӘ'),
    h('div',{className:'hdr'},h('h1',null,"Flinty's World Cup")),
    h('div',{className:'wrap'},
      h('div',{className:'setup-b'},
        h('h3',null,'Setup Required'),
        h('ol',null,
          h('li',null,'Open this file in a text editor'),
          h('li',null,'Go to supabase.com вҶ’ create a free project'),
          h('li',null,'Run the SQL from the comment block at the top of this file'),
          h('li',null,'Copy Project URL and anon key from Project Settings вҶ’ API'),
          h('li',null,'Replace ',h('code',null,'YOUR_SUPABASE_URL'),' and ',h('code',null,'YOUR_SUPABASE_ANON_KEY')),
          h('li',null,'Save and reopen')
        )
      )
    )
  );
}

const BLANK={username:'',topTeams:[],homeTeam:'',lowerTeams:[],legends_goals:'',legends_assists:'',legends_minutes:'',kane_top_scorer:'',golden_boot_list:'',golden_boot_goals:'',all_teams_score:'',quickest_goal:'',penalty_shootouts:'',best_luis:'',brunos_assists:'',haaland_unusual:'',yamal_score_assist:'',tartan_army:'',final_red_card:'',final_90mins:'',final_corners:'',final_2plus:'',final_shakira:'',final_madonna:'',final_trump:'',final_winner:''};

function App(){
  const[view,sV]=useState('p1');
  const[form,sF]=useState({...BLANK});
  const[entries,sE]=useState([]);
  const[last,sL]=useState(null);
  const[loading,sLd]=useState(true);
  const[saving,sSv]=useState(false);
  const[subErr,sSE]=useState('');
  const[showPw,sSP]=useState(false);

  useEffect(()=>{if(!CONFIGURED){sLd(false);return;}dbLoad().then(e=>{sE(e);sLd(false);}).catch(()=>sLd(false));const t=setTimeout(()=>sLd(false),8000);return()=>clearTimeout(t);},[]);

  if(!CONFIGURED)return h(SetupScreen);
  if(loading)return h('div',{className:'wrap'},h('div',{className:'loading'},'Loading'));

  const refresh=async()=>{const f=await dbLoad();sE(f);};

  const handleSubmit=async()=>{
    sSv(true);sSE('');
    try{
      const row={username:form.username,top1:form.topTeams[0]||null,top2:form.topTeams[1]||null,top3:form.topTeams[2]||null,home_team:form.homeTeam||null,lower1:form.lowerTeams[0]||null,lower2:form.lowerTeams[1]||null,lower3:form.lowerTeams[2]||null,legends_goals:form.legends_goals||null,legends_assists:form.legends_assists||null,legends_minutes:form.legends_minutes||null,kane_top_scorer:form.kane_top_scorer||null,golden_boot_list:form.golden_boot_list||null,golden_boot_goals:form.golden_boot_goals||null,all_teams_score:form.all_teams_score||null,quickest_goal:form.quickest_goal||null,penalty_shootouts:form.penalty_shootouts||null,best_luis:form.best_luis||null,brunos_assists:form.brunos_assists||null,haaland_unusual:form.haaland_unusual||null,yamal_score_assist:form.yamal_score_assist||null,tartan_army:form.tartan_army||null,final_red_card:form.final_red_card||null,final_90mins:form.final_90mins||null,final_corners:form.final_corners||null,final_2plus:form.final_2plus||null,final_shakira:form.final_shakira||null,final_madonna:form.final_madonna||null,final_trump:form.final_trump||null,final_winner:form.final_winner||null};
      const saved=await dbSave(row);sE(x=>[...x,saved]);sL(saved);sV('done');
    }catch(e){sSE('Could not save вҖ” check Supabase config and internet connection.');}
    sSv(false);
  };

  const doDelete=id=>sE(x=>x.filter(e=>e.id!==id));

  const AdminLink=()=>h('div',{className:'al-wrap'},
    !showPw?h('button',{className:'al-btn',onClick:()=>sSP(true)},'Admin access')
    :h(PwGate,{onSuccess:()=>{sV('admin');sSP(false);}})
  );

  if(view==='admin')return h(AdminScreen,{entries,onBack:()=>{sV('p1');sSP(false);},onDelete:doDelete,onRefresh:refresh});
  if(view==='groups')return h(GroupsView,{onBack:()=>sV('p1')});
  if(view==='done'&&last)return h('div',null,h('div',{className:'wrap'},h(DoneScreen,{entry:last,count:entries.length,onAnother:()=>{sF({...BLANK});sL(null);sV('p1');}}),h(AdminLink)));

  return h('div',null,
    view==='p1'&&h(Page1,{form,sf:sF,onNext:()=>sV('p2'),onGroups:()=>sV('groups'),entries}),
    view==='p2'&&h('div',null,h(Page2,{form,sf:sF,onNext:()=>sV('p3'),onBack:()=>sV('p1'),entries}),h('div',{className:'wrap'},h(AdminLink))),
    view==='p3'&&h('div',null,h(Page3,{form,sf:sF,onSubmit:handleSubmit,onBack:()=>sV('p2'),saving,subErr,entries}),h('div',{className:'wrap'},h(AdminLink)))
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
